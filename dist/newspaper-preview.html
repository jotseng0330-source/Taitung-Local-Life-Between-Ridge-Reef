<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>報紙預覽</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      }
      body {
        margin: 0;
        background: #07070d;
        color: #ededf0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .frame {
        width: min(1100px, 100%);
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 16px 48px rgba(0,0,0,0.28);
      }
      .title {
        margin: 0 0 12px;
        font-size: 1.1rem;
        color: #78c2c4;
      }
      .image-wrap {
        background: #0f1118;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,0.08);
      }
      img {
        display: block;
        width: 100%;
        height: auto;
        object-fit: contain;
      }
      .hint {
        margin-top: 12px;
        font-size: 0.95rem;
        color: rgba(237,237,240,0.72);
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <h1 class="title">報紙完整內容預覽</h1>
      <div class="image-wrap">
        <img id="preview-image" src="" alt="報紙完整圖片" />
      </div>
      <div class="hint">若圖片無法顯示，請確認檔案已上傳到 public 目錄。</div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const src = params.get("src");
      const img = document.getElementById("preview-image");
      if (src) {
        img.src = src;
      } else {
        img.src = "/news/placeholder-newspaper.svg";
      }
    </script>
  </body>
</html>
